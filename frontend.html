<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>DeepSeek 流式对话</title>
  <script src="https://cdn.bootcdn.net/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdn.bootcdn.net/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdn.bootcdn.net/ajax/libs/babel-standalone/7.22.5/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; display: flex; justify-content: center; padding: 40px 16px; }
    .container { width: 100%; max-width: 720px; }
    h2 { text-align: center; margin-bottom: 24px; color: #333; }
    .messages { background: #fff; border-radius: 12px; padding: 16px; min-height: 300px; max-height: 500px; overflow-y: auto; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .msg { margin-bottom: 16px; }
    .msg.user .bubble { background: #1677ff; color: #fff; margin-left: auto; }
    .msg.assistant .bubble { background: #f0f0f0; color: #333; }
    .bubble { display: inline-block; padding: 10px 14px; border-radius: 10px; max-width: 90%; white-space: pre-wrap; line-height: 1.6; }
    .label { font-size: 12px; color: #999; margin-bottom: 4px; }
    .msg.user .label { text-align: right; }
    .input-row { display: flex; gap: 8px; }
    textarea { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; resize: none; outline: none; }
    textarea:focus { border-color: #1677ff; }
    button { padding: 10px 24px; background: #1677ff; color: #fff; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; }
    button:disabled { background: #aaa; cursor: not-allowed; }
    .cursor { display: inline-block; width: 2px; height: 1em; background: #333; margin-left: 2px; animation: blink 0.7s infinite; vertical-align: text-bottom; }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useEffect } = React;

function App() {
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const bottomRef = useRef(null);

  useEffect(() => {
    bottomRef.current?.scrollIntoView({ behavior: "smooth" });
  }, [messages]);

  async function send() {
    if (!input.trim() || loading) return;
    const prompt = input.trim();
    setInput("");
    setLoading(true);
    setMessages(prev => [...prev, { role: "user", content: prompt }, { role: "assistant", content: "" }]);

    try {
      const resp = await fetch(`/chat?prompt=${encodeURIComponent(prompt)}`);
      const reader = resp.body.getReader();
      const decoder = new TextDecoder("utf-8");
      let buffer = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split("\n");
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith("data: ")) continue;
          const data = line.slice(6);
          if (data === "[DONE]") break;
          setMessages(prev => {
            const next = [...prev];
            next[next.length - 1] = { ...next[next.length - 1], content: next[next.length - 1].content + data };
            return next;
          });
        }
      }
    } catch (e) {
      setMessages(prev => {
        const next = [...prev];
        next[next.length - 1] = { ...next[next.length - 1], content: "请求失败：" + e.message };
        return next;
      });
    } finally {
      setLoading(false);
    }
  }

  return (
    <div className="container">
      <h2>DeepSeek 流式对话</h2>
      <div className="messages">
        {messages.map((m, i) => (
          <div key={i} className={`msg ${m.role}`}>
            <div className="label">{m.role === "user" ? "你" : "DeepSeek"}</div>
            <div className="bubble">
              {m.content}
              {loading && i === messages.length - 1 && m.role === "assistant" && <span className="cursor" />}
            </div>
          </div>
        ))}
        <div ref={bottomRef} />
      </div>
      <div className="input-row">
        <textarea
          rows={2}
          placeholder="输入问题，Enter 发送，Shift+Enter 换行"
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } }}
          disabled={loading}
        />
        <button onClick={send} disabled={loading}>{loading ? "生成中" : "发送"}</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
